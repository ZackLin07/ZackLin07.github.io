<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mouse Interaction</title>
<style>
  body {
    font-family: Arial;
  }

  .box {
    width: 200px;
    height: 120px;
    border: 1px solid #ccc;
    display: inline-block;
    margin: 20px;
    padding: 10px;
    text-align: center;
  }

  #text {
    font-size: 24px;
    margin-bottom: 15px;
    color: black;
  }

  button {
    padding: 5px 15px;
  }
</style>
</head>
<body>

<div class="box">
  <div id="text">Hello</div>
  <button id="btn">Button</button>
</div>

<script>
  const btn = document.getElementById("btn");
  const text = document.getElementById("text");

  // 滑鼠移上去 (hover)
  btn.addEventListener("mouseover", () => {
    text.style.color = "hotpink";
    text.textContent = "Hello";
  });

  // 點擊
  btn.addEventListener("click", () => {
    text.style.color = "hotpink";
    text.textContent = "Mouse Click";
  });

  // 滑鼠離開（可選，讓它回復）
  btn.addEventListener("mouseout", () => {
    text.style.color = "black";
    text.textContent = "Hello";
  });
</script>

</body>
</html>
