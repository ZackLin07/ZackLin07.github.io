<!DOCTYPE html>
<html>
<head>
  <style>
    p.one{
      border-style : double;
      border-width : 10px;
      border-color : red;
      background-color : lightblue;
      }
    p.two{
      border-width : 10px;
      border-radius : 15px;
      border-color : blue;
      background-color : yellow;
      }
    p.three{
      border-style : dotted;
      border-width : 10px;
      border-color : black;
      background-color : green;
      }
    </style>
</head>
<body>
  <p class="one">Hellow World</p>
  <p class="two">Hellow World</p>
  <p class="three">Hellow World</p>
  
</body>
</html>
