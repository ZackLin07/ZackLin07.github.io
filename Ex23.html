<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interactive Button</title>

<!-- Roboto -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Roboto', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }

    /* Button */
    .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;

        height: 22px;
        padding: 0 18px;

        font-size: 13px;
        color: #2f2f2f;

        background-color: #ffffff;
        border: 1px solid #2f2f2f;
        border-radius: 8px;

        cursor: pointer;
    }

    .btn:hover {
        background-color: #f5f5f5;
    }

    /* Info box */
    .info {
        margin-top: 20px;
        padding: 10px 15px;
        border: 1px solid #ccc;
        border-radius: 6px;
        display: none; /* й җиЁӯйҡұи—Ҹ */
        width: 250px;
        text-align: center;
    }
</style>
</head>

<body>

<button class="btn" onclick="toggleInfo()">иғҢжҷҜиіҮиЁҠ</button>

<div id="infoBox" class="info">
    иіҮиЁҠ <br>
</div>

<script>
function toggleInfo() {
    const box = document.getElementById("infoBox");
    if (box.style.display === "none") {
        box.style.display = "block";
    } else {
        box.style.display = "none";
    }
}
</script>

</body>
</html>
