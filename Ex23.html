<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spec Button</title>

<!-- Roboto 字體 -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Roboto', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #ffffff;
    }

    .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;

        height: 22px;                 /* h22 */
        padding: 0 18px;              /* 左右間距 (視覺約18~22) */

        font-size: 13px;              /* Roboto 13px */
        font-weight: 400;
        color: #2f2f2f;               /* spec 顏色 */

        background-color: #ffffff;    /* spec background */
        border: 1px solid #2f2f2f;    /* outline 1px */

        border-radius: 8px;           /* R8 */
        cursor: pointer;

        box-sizing: border-box;
    }

    /* hover（加分） */
    .btn:hover {
        background-color: #f5f5f5;
    }

    /* active（更像設計） */
    .btn:active {
        transform: scale(0.98);
    }
</style>
</head>

<body>

<button class="btn">查看資訊</button>

</body>
</html>
