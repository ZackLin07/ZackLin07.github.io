<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>顯示背景資訊</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Roboto', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #ffffff;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 22px;
      padding: 0 18px;
      font-size: 13px;
      font-weight: 400;
      color: #2f2f2f;
      background-color: #ffffff;
      border: 1px solid #2f2f2f;
      border-radius: 8px;
      box-sizing: border-box;
      cursor: pointer;
    }

    .btn:hover {
      background-color: #f5f5f5;
    }

    .image-box {
      margin-top: 20px;
      display: none;
      text-align: center;
    }

    .image-box img {
      max-width: 90vw;
      width: 700px;
      height: auto;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
    }
  </style>
</head>
<body>

  <button class="btn" onclick="showImage()">背景資訊</button>

  <div id="imageBox" class="image-box">
    <img src="Screenshot 2026-03-04 143546.png" alt="背景資訊圖片">
  </div>

  <script>
    function showImage() {
      document.getElementById("imageBox").style.display = "block";
    }
  </script>

</body>
</html>
