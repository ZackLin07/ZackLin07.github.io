<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exercise 18</title>
<style>
  body {
    font-family: "Times New Roman", serif;
    padding: 40px;
  }

  .card {
    background: linear-gradient(145deg, #f0f0f0, #cfcfcf);
    padding: 30px;
    width: 600px;
    box-shadow:
      8px 8px 18px rgba(0,0,0,0.6),
      -4px -4px 8px rgba(255,255,255,0.6);
    border: 1px solid #aaa;
  }

  /* Heading 1: upper line + pink shadow */
  h1 {
    font-size: 40px;
    margin: 0 0 20px 0;
    text-decoration: overline;
    text-shadow: 2px 2px 0px pink;
  }

  /* Heading 2: 3D black + yellow border */
  .h2-box {
    border: 3px solid yellow;
    padding: 6px;
    margin-bottom: 30px;
    background: #ddd;
    box-shadow: inset 0 0 0 1px black;
  }

  .h2-box h2 {
    margin: 0;
    font-style: italic;
  }

  /* Heading 3 */
  h3 {
    text-align: right;
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="card">
  <h1>This is heading 1</h1>

  <div class="h2-box">
    <h2>This is heading 2</h2>
  </div>

  <h3>This is heading 3</h3>
</div>

</body>
</html>
