<!DOCTYPE html>
<html>
<head>
<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 40px;
  height: 100vh;
  margin: 0;
}

/* 左右圖片 */
.side {
  width: 100px;
  height: 300px;
  border: 1px solid #ddd;
  padding: 5px;
}

/* 左：不變形 */
.left {
  object-fit: cover;
  border-radius: 18px;
}

/* 右：變形（故意不加 object-fit） */
.right {
  /* no object-fit → distortion */
}

/* 中間圓形 */
.center {
  width: 150px;
  height: 150px;
  object-fit: cover;
  border-radius: 50%;
  border: 1px solid #ddd;
  padding: 5px;
}

/* hover 效果 */
img:hover {
  box-shadow: 0 0 5px rgba(0, 140, 186, 0.5);
}
</style>
</head>

<body>

<!-- 左 -->
<img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34" class="side left">

<!-- 中 -->
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" class="center">

<!-- 右 -->
<img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34" class="side right">

</body>
</html>
