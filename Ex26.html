<!DOCTYPE html>
<html>
<head>
<style>
body {
  display: flex;
  justify-content: space-around;
  align-items: center;
  height: 100vh;
  margin: 0;
}

/* 左：不變形 + 圓角（❌拿掉 border） */
.left {
  width: 33%;
  height: 300px;
  object-fit: cover;
  border-radius: 18px;
  padding: 5px;
}

/* 中：圓形（保留 border） */
.center {
  width: 150px;
  height: 150px;
  object-fit: cover;
  border-radius: 50%;
  border: 1px solid #ddd;
  padding: 5px;
}

/* 右：變形（❌拿掉 border） */
.right {
  width: 33%;
  height: 300px;
  padding: 5px;
}

img:hover {
  box-shadow: 0 0 2px 1px rgba(0, 140, 186, 0.5);
}
</style>
</head>

<body>

<img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34" class="left">

<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" class="center">

<img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34" class="right">

</body>
</html>
