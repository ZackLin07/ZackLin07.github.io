<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Table and Fixed Div Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        /* Table styling */
        table {
            border-collapse: collapse;
            width: 300px;
            margin: 50px;
        }

        th, td {
            border: 2px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: gray;
            color: white;
        }

        /* Alternating row colors */
        tr:nth-child(2) {
            background-color: yellow;
        }

        tr:nth-child(3) {
            background-color: white;
        }

        tr:nth-child(4) {
            background-color: yellow;
        }

        /* Fixed div */
        .fixed-box {
            position: fixed;
            top: 20px;
            right: 20px;
            border: 3px solid green;
            padding: 15px;
            width: 180px;
            background-color: white;
        }
    </style>
</head>
<body>

    <!-- Table -->
    <table>
        <tr>
            <th>Bing-Yi</th>
            <th>Lin</th>
        </tr>
        <tr>
            <td>1</td>
            <td>1</td>
        </tr>
        <tr>
            <td>2</td>
            <td>2</td>
        </tr>
        <tr>
            <td>3</td>
            <td>3</td>
        </tr>
    </table>

    <!-- Fixed div -->
    <div class="fixed-box">
        This div element has position: fixed;
    </div>

</body>
</html>
